            [thought] {

                flex-direction: column;

            }

            [thought]:before,

                content: '';

                border-radius: 50%;

                width: 44px;

                left: 28px;
                box-shadow: -50px 30px 0 -12px var(--bubble-color);
            }

                bottom: -10px;

                font-variant: small-caps;

                font-size: 28px;
            }

                display: inline;
                z-index: 2;

            a {
                display: inline;
                font-size: 3vh;
                line-height: 2vh;
                color: black;
                transition: color 0.3s ease-out;

        @media (max-width: 568px) {

        .carousel__wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            height: 61.2vh;
        }

        .carousel .item {
            position: absolute;
            max-width: 1280px;
            height: 100%;
            margin-inline: var(--container-padding-horizontal);
            opacity: 0;
            will-change: transform, opacity;
            -webkit-animation: carousel-animate 27s cubic-bezier(0.37, 0, 0.63, 1) infinite;
