<!DOCTYPE html>
<html lang='en' dir='ltr'>

<head>
    <meta charset='utf-8'>
    <title></title>

</head>
<style media='screen'>
    body {
        background-color: black;

<body>
    <noscript>
        <style media='screen'>
            body {
                margin: 0;
                padding: 0
            }

            @font-face {
                font-family: CyberwayRiders;
                src: url(static/CyberwayRiders.ttf);
            }

            noscript {
                width: 100vw;
                height: 100vh;
                background-color: black;
                display: block;
                overflow: hidden;
                background-image: url(img/noscript.jpg);
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                --bubble-color: #fff;
            }

            [thought] {
                display: flex;
                background-color: var(--bubble-color);
                padding-left: 1vw;
                padding-right: 1vw;
                padding-top: 2vh;
                padding-bottom: 2vh;
                border-radius: 30px;
                min-width: 340px;
                width: 25vw;
                height: 15vh;
                margin-left: 1vw;
                margin-right: 1vw;
                margin-top: 2vh;
                margin-bottom: 2vh;
                position: relative;
                align-items: center;
                justify-content: center;
                text-align: center;
                flex-direction: column;
                font-size: 2vh;
                left: 10vw;
                top: 10vh;
                opacity: 0.7;
            }

            [thought]:before,
            [thought]:after {
                content: '';
                background-color: var(--bubble-color);
                border-radius: 50%;
                display: block;
                position: absolute;
                z-index: 1;
            }

            [thought]:before {
                width: 44px;
                height: 44px;
                top: -12px;
                left: 28px;
                box-shadow: -50px 30px 0 -12px var(--bubble-color);
            }

            [thought]:after {
                bottom: -10px;
                right: 26px;
                width: 30px;
                height: 30px;
                box-shadow: 40px -34px 0 0 var(--bubble-color),
                    -28px -6px 0 -2px var(--bubble-color),
                    -24px 17px 0 -6px var(--bubble-color),
                    -5px 25px 0 -10px var(--bubble-color);
            }

            [emphasis] {
                font-family: CyberwayRiders;
                font-variant: small-caps;
                color: black;
                font-size: 28px;
            }

            [thought]>div {
                display: inline;
                z-index: 2;
            }

            a {
                display: inline;
                font-size: 3vh;
                line-height: 2vh;
                color: black;
                transition: color 0.3s ease-out;
            }

            a:hover {
                color: grey;
            }
        </style>
        <div thought>
            <div>Yeah, I tried runnin' with HTML alone and I can tell ya there's right amount of meth and cough syrup for that.</div></br>
            <div>But right now I reckon we need some </div>
            <div emphasis><a href='https://www.enable-javascript.com/'>scripting</a></div> functionality to run this.
        </div>
    </noscript>

    <diagnostics>
        <write>
            <script media='screen'>
                const write = document.querySelector('diagnostics write')
                if (navigator.cookieEnabled)
                    write.setAttribute('supports', 'true')
                else
                    write.setAttribute('supports', 'false')
            </script>
        </write>
        <storage>
            <script media='screen'>
                const storage = document.querySelector('diagnostics storage')
                try {
                    if (window.localStorage && window.sessionStorage)
                        storage.setAttribute('supports', 'true')
                } catch (e) {
                    storage.setAttribute('supports', 'false')
                }
            </script>
        </storage>
        <landscape>
            <script media='screen'>
                function setLandscape() {
                    const landscape = document.querySelector('diagnostics landscape')
                    if (window.innerWidth > window.innerHeight)
                        landscape.setAttribute('supports', 'true')
                    else
                        landscape.setAttribute('supports', 'false')
                }
                window.addEventListener('resize', setLandscape)
                setLandscape()
            </script>
        </landscape>
        <indexeddb>
            <script media='screen'>
                const indexeddb = document.querySelector("diagnostics indexeddb")
                if ('indexedDB' in window)
                    indexeddb.setAttribute("supported", "true")
                else
                    indexeddb.setAttribute("supported", "false")
            </script>
        </indexeddb>
        <webrtc>
            <script media='screen'>
                const webrtc = document.querySelector("diagnostics webrtc")
                if (RTCDataChannel)
                    webrtc.setAttribute("supported", "true")
                else
                    webrtc.setAttribute("supported", "false")
            </script>
        </webrtc>
        <webkit>
            <script media='screen'>
                const webkit = document.querySelector("diagnostics webkit")
                if ('webkitRequestAnimationFrame' in window)
                    webkit.setAttribute("supported", "true")
                else
                    webkit.setAttribute("supported", "false")
            </script>
        </webkit>
        <shadowdom>
            <script media="screen">
                const shadowdom = document.querySelector("diagnostics shadowdom")
                if (document.head.createShadowRoot || document.head.attachShadow)
                    shadowdom.setAttribute("supported", "true")
                else
                    shadowdom.setAttribute("supported", "false")
            </script>
        </shadowdom>
        <es6>
            <script media='screen'>
                const es6 = document.querySelector("diagnostics es6")
                try {
                    new Function("(a = 0) => a");
                    es6.setAttribute("supported", "true")
                } catch (err) {
                    es6.setAttribute("supported", "false")
                }
            </script>
        </es6>
        <firefox>
            <script media="screen">
                const firefox = document.querySelector("diagnostics firefox")
                if (navigator.userAgent.toLowerCase().indexOf('firefox') > -1)
                    firefox.setAttribute("supported", "true")
                else
                    firefox.setAttribute("supported", "false")
            </script>
        </firefox>
        <ie>
            <script media="screen">
                const ie = document.querySelector("diagnostics ie")
                if (/MSIE|Trident/.test(window.navigator.userAgent))
                    ie.setAttribute("supported", "true")
                else
                    ie.setAttribute("supported", "false")
            </script>
        </ie>
        <edge>
            <script media="screen">
                const edge = document.querySelector("diagnostics edge")
                if (/Edg/.test(window.navigator.userAgent))
                    edge.setAttribute("supported", "true")
                else
                    edge.setAttribute("supported", "false")
            </script>
        </edge>
        <webgl>
            <script media="screen">
                const canvas = document.createElement("canvas")
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl")

                const webgl = document.querySelector("diagnostics webgl")
                if (gl instanceof WebGLRenderingContext)
                    webgl.setAttribute("supported", "true")
                else
                    webgl.setAttribute("supported", "false")
            </script>
        </webgl>
        <flex>
            <script media="screen">
                const flex = document.querySelector("diagnostics flex")
                if (CSS.supports("display:flex"))
                    flex.setAttribute("supported", "true")
                else
                    flex.setAttribute("supported", "false")
            </script>
        </flex>
        <opentype>
            <script media="screen">
                const opentype = document.querySelector("diagnostics opentype")
                if (CSS.supports("font-format(opentype)"))
                    opentype.setAttribute("supported", "true")
                else
                    opentype.setAttribute("supported", "false")
            </script>
        </opentype>
        <woff>
            <script media="screen">
                const woff = document.querySelector("diagnostics woff")
                if (CSS.supports("font-format(woff)") || CSS.supports("font-format(woff)"))
                    woff.setAttribute("supported", "true")
                else
                    woff.setAttribute("supported", "false")
            </script>
        </woff>
        <ios>
            <script media="screen">
                const ios = document.querySelector("diagnostics ios")
                if (CSS.supports("-webkit-touch-callout: none"))
                    ios.setAttribute("supported", "true")
                else
                    ios.setAttribute("supported", "false")
            </script>
        </ios>
        <has>
            <script media="screen">
                const has = document.querySelector("diagnostics has:has(script)")
                if (has)
                    has.setAttribute("supported", "true")
                else
                    has.setAttribute("supported", "false")
            </script>
        </has>
        <hd>
            <script media="screen">
                const hd = document.querySelector("diagnostics hd")
                if (window.matchMedia("min-width: 1440px"))
                    hd.setAttribute("supported", "true")
                else
                    hd.setAttribute("supported", "false")
            </script>
        </hd>
        <uhd>
            <script media="screen">
                const uhd = document.querySelector("diagnostics uhd")
                if (window.matchMedia("min-width: 2560px"))
                    uhd.setAttribute("supported", "true")
                else
                    uhd.setAttribute("supported", "false")
            </script>
        </uhd>
        <hdr>
            <script media="screen">
                const hdr = document.querySelector("diagnostics hdr")
                if (window.matchMedia("video-dynamic-range: high"))
                    hdr.setAttribute("supported", "true")
                else
                    hdr.setAttribute("supported", "false")
            </script>
        </hdr>
        <replaceState>
            <script media="screen">
                const replaceState = document.querySelector("diagnostics replaceState")
                if (window.history.replaceState)
                    replaceState.setAttribute("supported", "true")
                else
                    replaceState.setAttribute("supported", "false")
            </script>
        </replaceState>
