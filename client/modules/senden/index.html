<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Transfer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="connection-setup">
            <h2>Connection Setup</h2>
            <div class="peer-info">
                <div class="your-id">
                    <p>Your ID: <span id="peerId">Connecting...</span></p>
                    <button id="copyId">Copy ID</button>
                </div>
                <div class="connect-to">
                    <input type="text" id="remotePeerId" placeholder="Enter remote peer ID">
                    <button id="connect">Connect</button>
                </div>
            </div>
            <div class="connection-status">
                <p>Status: <span id="connectionStatus">Not Connected</span></p>
            </div>
        </div>

        <div class="transfer-area">
            <div class="sender-controls">
                <input type="file" id="fileInput">
                <button id="sendFile" disabled>Send File</button>
            </div>
            
            <div class="transfer-info">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
                <div class="stats">
                    <p>File Size: <span id="fileSize">-</span></p>
                    <p>Current Speed: <span id="currentSpeed">-</span></p>
                    <p>Estimated Time: <span id="estimatedTime">-</span></p>
                    <p>Chunk Size: <span id="chunkSize">-</span></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
