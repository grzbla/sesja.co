<div background>
    <style media='screen'>
        body {
            margin: 0;
            padding: 0
        }

        @font-face {
            font-family: CyberwayRiders;
            src: url(static/CyberwayRiders.ttf);
        }

        [background] {
            width: 100vw;
            height: 100vh;
            background-color: black;
            display: block;
            overflow: hidden;
            background-image: url(static/noscript.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            --bubble-color: #fff;
        }

        [thought] {
            display: flex;
            background-color: var(--bubble-color);
            padding-left: 1vw;
            padding-right: 1vw;
            padding-top: 2vh;
            padding-bottom: 2vh;
            border-radius: 30px;
            min-width: 340px;
            width: 25vw;
            height: 15vh;
            margin-left: 1vw;
            margin-right: 1vw;
            margin-top: 2vh;
            margin-bottom: 2vh;
            position: relative;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            font-size: 2vh;
            left: 10vw;
            top: 10vh;
            opacity: 0.7;
        }

        [thought]:before,
        [thought]:after {
            content: '';
            background-color: var(--bubble-color);
            border-radius: 50%;
            display: block;
            position: absolute;
            z-index: 1;
        }

        [thought]:before {
            width: 44px;
            height: 44px;
            top: -12px;
            left: 28px;
            box-shadow: -50px 30px 0 -12px var(--bubble-color);
        }

        [thought]:after {
            bottom: -10px;
            right: 26px;
            width: 30px;
            height: 30px;
            box-shadow: 40px -34px 0 0 var(--bubble-color),
                -28px -6px 0 -2px var(--bubble-color),
                -24px 17px 0 -6px var(--bubble-color),
                -5px 25px 0 -10px var(--bubble-color);
        }

        [emphasis] {
            font-family: CyberwayRiders;
            font-variant: small-caps;
            color: black;
            font-size: 28px;
        }

        [thought]>div {
            display: inline;
            z-index: 2;
        }

        a {
            display: inline;
            font-size: 3vh;
            line-height: 2vh;
            color: black;
            transition: color 0.3s ease-out;
        }

        a:hover {
            color: grey;
        }
    </style>
    <div thought>
        <div>We knew this day would come, finally on the wrong side of town.</div></br>
        <div>Whatever lied ahead, senses told us to go back.</div>
    </div>
</div background>
