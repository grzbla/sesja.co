<style media='screen'>
    body {
        background-color: black;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    @keyframes carousel-animate {
        0% {
            visibility: hidden;
            opacity: 0;
            transform: translateX(200%) scale(0.7);
        }

        3%,
        14.2857142857% {
            visibility: visible;
            opacity: 0.8;
            transform: translateX(100%) scale(0.9);
        }

        17.2857142857%,
        28.5714285714% {
            visibility: visible;
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        31.5714285714%,
        42.8571428571% {
            visibility: visible;
            opacity: 0.8;
            transform: translateX(-100%) scale(0.9);
        }

        45.8571428571% {
            visibility: visible;
            opacity: 0;
            transform: translateX(-200%) scale(0.9);
        }

        100% {
            visibility: hidden;
            opacity: 0;
            transform: translateX(-200%) scale(0.7);
        }
    }

    .container {
        --container-padding-horizontal: 32px;
        position: relative;
        padding-inline: var(--container-padding-horizontal);
        display: grid;
        place-items: center;
        height: 100%;
        overflow: hidden;
    }

    .carousel {
        pointer-events: none;
        position: absolute;
        -webkit-padding-before: 67px;
        padding-block-start: 67px;
        -webkit-padding-after: max(24px, calc(29px + var(--font-size-md)));
        padding-block-end: max(24px, calc(29px + var(--font-size-md)));
        perspective: 100px;
        width: 100%;
    }

    @media (max-width: 568px) {
        .carousel {
            -webkit-padding-after: 52px;
            padding-block-end: 52px;
        }
    }

    .carousel__wrapper {
        position: relative;
        display: flex;
        justify-content: center;
        height: 61.2vh;
    }

    .carousel .item {
        position: absolute;
        max-width: 1280px;
        height: 100%;
        margin-inline: var(--container-padding-horizontal);
        opacity: 0;
        will-change: transform, opacity;
        -webkit-animation: carousel-animate 27s cubic-bezier(0.37, 0, 0.63, 1) infinite;
        animation: carousel-animate 27s cubic-bezier(0.37, 0, 0.63, 1) infinite;
    }


    .carousel .item:nth-child(1) {
        -webkit-animation-delay: calc(3.8571428571s * -1);
        animation-delay: calc(3.8571428571s * -1);
    }

    .carousel .item:nth-child(2) {
        -webkit-animation-delay: calc(3.8571428571s * 0);
        animation-delay: calc(3.8571428571s * 0);
    }

    .carousel .item:nth-child(3) {
        -webkit-animation-delay: calc(3.8571428571s * 1);
        animation-delay: calc(3.8571428571s * 1);
    }

    .carousel .item:nth-child(4) {
        -webkit-animation-delay: calc(3.8571428571s * 2);
        animation-delay: calc(3.8571428571s * 2);
    }

    .carousel .item:nth-child(5) {
        -webkit-animation-delay: calc(3.8571428571s * 3);
        animation-delay: calc(3.8571428571s * 3);
    }

    .carousel .item:nth-child(6) {
        -webkit-animation-delay: calc(3.8571428571s * 4);
        animation-delay: calc(3.8571428571s * 4);
    }

    .carousel .item:nth-child(7) {
        -webkit-animation-delay: calc(3.8571428571s * 4);
        animation-delay: calc(3.8571428571s * 4);
    }

    .carousel .item:nth-child(8) {
        -webkit-animation-delay: calc(3.8571428571s * 3);
        animation-delay: calc(3.8571428571s * 3);
    }

    .carousel .item:last-child {
        -webkit-animation-delay: calc(-3.8571428571s * 2);
        animation-delay: calc(-3.8571428571s * 2);
    }

    .carousel img {
        max-width: 100%;
        -o-object-fit: cover;
        object-fit: cover;
        height: 100%;
    }

    .loader {
        width: 48px;
        height: 24px;
        display: inline-block;
        position: relative;
        border: 1px solid #f0f;
        bottom: 10vh;
        left: calc(50vw - 24px);
    }

    .loader::after {
        content: '';
        box-sizing: border-box;
        position: absolute;
        left: 100%;
        top: 50%;
        transform: translateY(-50%);
        border: 1px solid #f0f;
        width: 5px;
        height: 12px;
    }

    .loader::before {
        content: '';
        position: absolute;
        left: -8px;
        top: 50%;
        transform: translateY(-50%);
        height: 80%;
        width: 6px;
        box-sizing: border-box;
        animation: animloader 5s linear infinite;
    }

    @keyframes animloader {
        0% {
            box-shadow: 11px 0 rgba(255, 255, 255, 0), 22px 0 rgba(255, 255, 255, 0), 33px 0 rgba(255, 255, 255, 0), 44px 0 rgba(255, 255, 255, 0);
        }

        10% {
            box-shadow: 11px 0 red, 22px 0 rgba(255, 255, 255, 0), 33px 0 rgba(255, 255, 255, 0), 44px 0 rgba(255, 255, 255, 0);
        }

        20% {
            box-shadow: 11px 0 red, 22px 0 yellow, 33px 0 rgba(255, 255, 255, 0), 44px 0 rgba(255, 255, 255, 0);
        }

        30% {
            box-shadow: 11px 0 red, 22px 0 yellow, 33px 0 blue, 44px 0 rgba(255, 255, 255, 0);
        }

        40% {
            box-shadow: 11px 0 green, 22px 0 green, 33px 0 green, 44px 0 green;
        }

        42.5% {
            box-shadow: 11px 0 rgba(255, 255, 255, 0), 22px 0 rgba(255, 255, 255, 0), 33px 0 rgba(255, 255, 255, 0), 44px 0 rgba(255, 255, 255, 0);
        }

        45% {
            box-shadow: 11px 0 green, 22px 0 green, 33px 0 green, 44px 0 green;
        }

        100% {
            box-shadow: 11px 0 green, 22px 0 green, 33px 0 green, 44px 0 green;
        }
    }

    #container {
        position: absolute;
        margin: auto;
        width: 100vw;
        height: 80pt;
        top: 0;
        bottom: 0;

        filter: url(#threshold) blur(0.6px);
    }

    #text1,
    #text2 {
        font-family: 'pixel-krud';
        position: absolute;
        width: 100%;
        display: inline-block;

        font-size: 32pt;
        font-variant: small-caps;

        text-align: center;

        user-select: none;
        color: white;
    }

    @font-face {
        font-family: 'pixel-krud';
        src: url(pixel-krud-brk.regular.ttf);
    }
</style>

            <div class="item" id="slide-7"><img src="img\caniplaywithmadness_canon_r5_photography_of_los_angeles_skyline_e7668ab5-9aba-4b65-86a5-e423768bb76f.jpg" /></div>
