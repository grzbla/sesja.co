<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title></title>

        <style test media="screen">
            test
            {
                --barcode-length: 24;
                --assert-true-color: #444444;

                width: auto;
                height: auto;
                display: block;
                position: fixed;
                z-index: var(--test-layer-id);
            }
            test > css
            {
                width: inherit;
                height: inherit;
                display: block;
            }
            test > css > *
            {
                width: calc(100vw / calc(var(--barcode-length) * 2));
                height: 100vh;
                margin: 0 0 0 calc(100vw / calc(var(--barcode-length) * 2));
                background-color: transparent;
                display: inline-block;
                vertical-align: top;
                color: limegreen;
                font-size: 16px;
                text-align: center;
                padding-top: 1.5vh;
                font-variant: small-caps;
            }
            test > css > *[true] { background-color: var(--assert-true-color) }
            @supports selector(div[parent] > [child][with][additional][params]) { test > css > selector { background-color: var(--assert-true-color) } }
            @supports (display:flex) { test > css > flex { background-color: var(--assert-true-color) } }
            @supports font-format(opentype) { test > css > opentype { background-color: var(--assert-true-color) } }
            @supports font-format(woff) or font-format(woff2) { test > css > woff { background-color: var(--assert-true-color) } }
            @supports (-webkit-touch-callout: none) { test > css > ios { background-color: var(--assert-true-color) } }
            @supports (ul:has(> li )) { test > css > has { background-color: var(--assert-true-color) } }
            @media screen and (min-width: 1024px) { test > css > ahd { background-color: var(--assert-true-color) } }
            @media screen and (min-width: 1440px) { test > css > hd { background-color: var(--assert-true-color) } }
            @media screen and (min-width: 2560px) { test > css > uhd { background-color: var(--assert-true-color) } }
            @media (scripting: enabled) { test > css > ff-scripting { background-color: var(--assert-true-color) } }
            @media (scripting: enabled) { test > css > webkit { background-color: var(--assert-true-color) } }
            @media (video-dynamic-range: high) { test > css > hdr { background-color: var(--assert-true-color) } }
            @-moz-document url-prefix() { test > css > firefox { background-color: var(--assert-true-color) } }


        </style>
        <style media="screen">
            :root
            {
                --test-layer-id: -1337;
                --container-layer-id: 1;
                --hover-scale-factor: 1.25;
                --primary-transition-time: 0.4s;
                --primary-transition-type: ease-out;
                --full-element-width: 92vw;
                --half-element-width: 40vw;
                --demi-element-width: 20vw;
                --two-element-width: 59vw;
                --third-element-width: 28vw;
                --primary-margin-inline-start: 5vw;
                --primary-box-blur-radius: 3px;
            }
            body
            {
                background-color: black;
                width: 100vw;
                height: 100vh;
                margin: 0;
                overflow: hidden;
            }


            [container]
            {
                margin: 0;
                width: calc(100vw + 18px);
                height: 100vh;
                overflow-x: hidden;
                overflow-y: auto;
                z-index: var(--container-layer-id);
            }
            [document]
            {
                width: auto;
                height: auto;
                display: flex;
                z-index: var(--container-layer-id);
                flex-wrap: wrap;
                flex-direction: row;
                margin-inline-start: var(--primary-margin-inline-start);
                box-sizing: content-box;
                justify-content: space-between;
                padding-top: 1vw;
                overflow: hidden;
            }
            [document] > div
            {
                display: inline-block;
                margin-top: 2vh;
                margin-bottom: 2vh;
                min-height: 340px; max-height: 30vh;
                box-sizing: content-box;
                margin-inline-end: 3vw;
                transition: transform var(--primary-transition-time) var(--primary-transition-type),
                            background-color var(--primary-transition-time) var(--primary-transition-type),
                            backdrop-filter var(--primary-transition-time) var(--primary-transition-type);
                backdrop-filter: blur(var(--primary-box-blur-radius));
            }

            [document] > [full] { display: block; border: 0.1vw solid red; width: var(--full-element-width);}
            [document] > [demi] { border: 0.1vw solid green; width: var(--demi-element-width);}
            [document] > [half] { border: 0.1vw solid blue; width: var(--half-element-width);}
            [document] > [third] { border: 0.1vw solid white; width: var(--third-element-width);}
            [document] > [two] { border: 0.1vw solid purple; width: var(--two-element-width);}
        </style>

        <style media="screen and (hover: hover)">
            /*
                hover effects
            */
            [document]
            {
                --hover-box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
                --hover-box-bgcolor: rgba(53, 36, 112, 0.2);
                --hover-box-flicker-bgcolor: #ffffff1a;
                --hover-box-blur-radius: 7.5px;
                --hover-box-flicker-blur-radius: 10px;
            }
            [document] > div:hover
            {
                transform: scale(var(--hover-scale-factor));
                cursor: pointer;
                z-index: calc(var(--container-layer-id) + 1);
                background: var(--hover-box-bgcolor);
                box-shadow: var(--hover-box-shadow);
                backdrop-filter: blur(var(--hover-box-blur-radius));
                animation: flicker 5s infinite;
            }
            @keyframes flicker
            {
                0% {
                    background-color: transparent;
                    backdrop-filter: blur(var(--hover-box-blur-radius));
                }
                92.25% {
                    background-color: transparent;
                    backdrop-filter: blur(var(--hover-box-blur-radius));
                }
                92.5% {
                    background-color: var(--hover-box-flicker-bgcolor);
                    backdrop-filter: blur(var(--hover-box-flicker-blur-radius));
                }
                93% {
                    background-color: var(--hover-box-flicker-bgcolor);
                    backdrop-filter: blur(var(--hover-box-flicker-blur-radius));
                }
                93.5% {
                    background-color: var(--hover-box-bgcolor);
                    backdrop-filter: blur(var(--primary-box-blur-radius));
                }
                94% {
                    background-color: var(--hover-box-bgcolor);
                    backdrop-filter: blur(var(--primary-box-blur-radius));
                }
                94.5% {
                    background-color: var(--hover-box-flicker-bgcolor);
                    backdrop-filter: blur(var(--hover-box-flicker-blur-radius));
                }
                95% {
                    background-color: var(--hover-box-flicker-bgcolor);
                    backdrop-filter: blur(var(--hover-box-flicker-blur-radius));
                }
                100% {
                    background-color: transparent;
                    backdrop-filter: blur(var(--hover-box-blur-radius));
                }
            }
        </style>
    </head>
    <body>
        <test>
            <css>
                <js>js</js>
                <write>write</write>
                <storage>storage</storage>
                <idb>idb</idb>
                <webrtc>rtc</webrtc>
                <webkit>wk</webkit>
                <selector>[]</selector>
                <flex>flex</flex>
                <opentype>ot</opentype>
                <woff>woff</woff>
                <has>has</has>
                <ahd>ahd</ahd>
                <hd>hd</hd>
                <uhd>uhd</uhd>
                <landscape>---</landscape>
                <firefox>ff</firefox>
                <ff-scripting>ff-s</ff-scripting>
                <ios>ios</ios>
                <ie>ie</ie>
                <edge>edge</edge>
                <webgl>wgl</webgl>
                <hdr>hdr</hdr>
            </css>
            <tests>
                <div parent><div child with additional params></div></div>
                <script js media="screen">
                    document.querySelector("test > css > js").setAttribute("true", "")
                </script>
                <script write media="screen">
                    if (navigator.cookieEnabled)
                        document.querySelector("test > css > write").setAttribute("true", "")
                </script>
                <script storage media="screen">
                    try
                    {
                        if (window.localStorage && window.sessionStorage)
                            document.querySelector("test > css > storage").setAttribute("true", "")
                    }
                    catch (e){}
                </script>
                <!-- <script firefox media="screen">
                    if (navigator.userAgent.toLowerCase().includes('firefox'))
                    {
                        const firefox = document.querySelector("test > css > firefox")
                        if (firefox)
                            firefox.setAttribute("true", "")
                    }
                </script> -->
                <script landscape media="screen">
                    if (window.innerWidth > window.innerHeight)
                    {
                        const landscape = document.querySelector("test > css > landscape")
                        if (landscape)
                            landscape.setAttribute("true", "")
                    }
                </script>
                <script idb media="screen">
                    if ('indexedDB' in window)
                    {
                        const idb = document.querySelector("test > css > idb")
                        if (idb)
                            idb.setAttribute("true", "")
                    }
                </script>
                <script webrtc media="screen">
                    if (RTCDataChannel)
                    {
                        const webrtc = document.querySelector("test > css > webrtc")
                        if (webrtc)
                            webrtc.setAttribute("true", "")
                    }
                </script>
                <script webkit media="screen">
                    if ('webkitRequestAnimationFrame' in window)
                    {
                        const webrtc = document.querySelector("test > css > webkit")
                        if (webrtc)
                            webrtc.setAttribute("true", "")
                    }
                </script>
                <script ie media="screen">
                    if (/MSIE|Trident/.test(window.navigator.userAgent))
                    {
                        const ie = document.querySelector("test > css > ie")
                        if (ie)
                            ie.setAttribute("true", "")
                    }
                </script>
                <script edge media="screen">
                    if (/Edg/.test(window.navigator.userAgent))
                    {
                        const edge = document.querySelector("test > css > edge")
                        if (edge)
                            edge.setAttribute("true", "")
                    }
                </script>
                <script webgl media="screen">
                    const canvas = document.createElement("canvas")
                    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl")

                    if (gl instanceof WebGLRenderingContext)
                    {
                        const webgl = document.querySelector("test > css > webgl")
                        if (webgl)
                            webgl.setAttribute("true", "")
                    }
                </script>
            </tests>
        </test>

        <div container><div document>
            <div full></div>
            <div demi></div>
            <div demi></div>
            <div half></div>
            <div third></div>
            <div two></div>
            <div third></div>
            <div third></div>
            <div third></div>
        </div></div>

    </body>
</html>
